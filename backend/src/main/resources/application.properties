spring.application.name=ElectroShop

# ===============================
# MySQL DataSource
# ===============================
# LOCAL default below. In production (Render + Aiven) override with env vars:
#   SPRING_DATASOURCE_URL=jdbc:mysql://<host>:<port>/<db>?ssl-mode=REQUIRED
#   SPRING_DATASOURCE_USERNAME=<aiven user>
#   SPRING_DATASOURCE_PASSWORD=<aiven password>
# (Environment variables take precedence over the values below.)
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:electroshop}?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=update
# Keep the connection pool small — friendlier to free-tier RAM and to Aiven's
# free MySQL connection limit.
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000
# Verbose SQL logging is very expensive on a throttled free-tier CPU (it logs
# every statement + every parameter bind). Keep it OFF in production; override
# with SPRING_JPA_SHOW_SQL=true locally when you need to debug queries.
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ===============================
# SQL logging (quiet by default; raise locally to debug)
# ===============================
logging.level.org.hibernate.SQL=${SQL_LOG_LEVEL:WARN}
logging.level.org.hibernate.orm.jdbc.bind=WARN
logging.level.com.electroshop=INFO

# ===============================
# Server
# ===============================
# Render (and most PaaS) inject the port via the PORT env var.
server.port=${PORT:${SERVER_PORT:8080}}
server.servlet.context-path=/api
# Cap Tomcat threads to keep memory low on small (512MB) free instances.
server.tomcat.threads.max=20
server.tomcat.threads.min-spare=2
server.tomcat.max-connections=100

# ===============================
# File upload (product images)
# ===============================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=${UPLOAD_DIR:uploads}

# ===============================
# JWT
# ===============================
# Base64-encoded 256-bit secret. OVERRIDE in production via env var JWT_SECRET.
app.jwt.secret=${JWT_SECRET:Y2hhbmdlLW1lLXRoaXMtaXMtYS1kZXYtc2VjcmV0LWtleS1lbGVjdHJvc2hvcC0yMDI2fQ==}
app.jwt.access-token-expiration-ms=900000
app.jwt.refresh-token-expiration-ms=604800000

# ===============================
# CORS (frontend origin)
# ===============================
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

# ===============================
# Rate limiting (requests per minute on /auth/**)
# ===============================
app.ratelimit.auth.capacity=10
app.ratelimit.auth.refill-minutes=1
